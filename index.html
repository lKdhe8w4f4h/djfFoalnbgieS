<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>受保護頁面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    #main-content {
      display: none;
    }

    #login-box {
      max-width: 320px;
      margin: 100px auto;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div id="login-box">
    <h2>請輸入密碼</h2>
    <input type="password" id="password" placeholder="密碼" />
    <button onclick="checkPassword()">登入</button>
    <p id="error" class="error"></p>
  </div>

  <div id="main-content">
    <h1>主要內容</h1>
    <p>這裡是登入後才顯示的內容。</p>
  </div>

  <script>
    function checkPassword() {
      const input = document.getElementById("password").value;
      const correctPassword = "myPassword123";

      if (input === correctPassword) {
        document.getElementById("login-box").style.display = "none";
        document.getElementById("main-content").style.display = "block";
      } else {
        document.getElementById("error").textContent = "密碼錯誤，請再試一次。";
      }
    }
  </script>

</body>
</html>
