<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>受保護頁面</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      margin: 0;
      padding: 40px;
      background: #f6f7f9;
    }

    #login-box {
      max-width: 380px;
      margin: 100px auto;
      padding: 28px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 14px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #374151;
    }

    #error {
      color: #d00;
      margin-top: 12px;
    }

    #main-content {
      display: none;
      max-width: 760px;
      margin: 40px auto;
      background: white;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

  <div id="login-box">
    <h2>請輸入密碼</h2>
    <input type="password" id="password" placeholder="密碼" />
    <button onclick="checkPassword()">登入</button>
    <p id="error"></p>
  </div>

  <div id="main-content">
    <h1>主要內容</h1>
    <p>這裡是輸入正確密碼後才顯示的內容。</p>
    <p>但請記住：如果這些內容已經寫在 HTML 裡，懂技術的人仍然可能從原始碼看到。</p>
  </div>

  <script>
    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function getCorrectHash() {
      const response = await fetch("password-hash.txt", {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("無法讀取 password-hash.txt");
      }

      const text = await response.text();
      return text.trim();
    }

    async function checkPassword() {
      const passwordInput = document.getElementById("password");
      const error = document.getElementById("error");

      const inputPassword = passwordInput.value;

      if (!inputPassword) {
        error.textContent = "請輸入密碼。";
        return;
      }

      try {
        const correctHash = await getCorrectHash();
        const inputHash = await sha256(inputPassword);

        if (inputHash === correctHash) {
          sessionStorage.setItem("authenticated", "true");
          showMainContent();
        } else {
          error.textContent = "密碼錯誤，請再試一次。";
        }
      } catch (err) {
        error.textContent = "驗證資料讀取失敗。";
        console.error(err);
      }
    }

    function showMainContent() {
      document.getElementById("login-box").style.display = "none";
      document.getElementById("main-content").style.display = "block";
    }

    window.addEventListener("load", function () {
      if (sessionStorage.getItem("authenticated") === "true") {
        showMainContent();
      }
    });

    document.getElementById("password").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        checkPassword();
      }
    });
  </script>

</body>
</html>
