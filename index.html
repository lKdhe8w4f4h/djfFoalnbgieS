<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>受保護頁面</title>

  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      padding: 40px;
    }

    #login-box {
      max-width: 380px;
      margin: 100px auto;
      padding: 24px;
      border: 1px solid #ddd;
      border-radius: 12px;
      text-align: center;
    }

    #main-content {
      display: none;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 12px 0;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    #error {
      color: red;
    }
  </style>
</head>
<body>

  <div id="login-box">
    <h2>請輸入密碼</h2>
    <input type="password" id="password" placeholder="密碼" />
    <button id="login-button">登入</button>
    <p id="error"></p>
  </div>

  <div id="main-content">
    <!-- 登入成功後才載入內容 -->
  </div>

  <script>
    let mainScriptLoaded = false;

    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));

      return hashArray
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    async function getCorrectHash() {
      const response = await fetch("password-hash.txt", {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("無法讀取 password-hash.txt");
      }

      const text = await response.text();
      return text.trim();
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (mainScriptLoaded) {
          resolve();
          return;
        }

        const script = document.createElement("script");
        script.src = src;
        script.defer = true;

        script.onload = () => {
          mainScriptLoaded = true;
          resolve();
        };

        script.onerror = () => {
          reject(new Error("無法載入 script：" + src));
        };

        document.body.appendChild(script);
      });
    }

    async function loadProtectedContent() {
      const response = await fetch("content.html", {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("無法載入 content.html");
      }

      const html = await response.text();
      document.getElementById("main-content").innerHTML = html;
    }

    async function unlockPage() {
      document.getElementById("login-box").style.display = "none";
      document.getElementById("main-content").style.display = "block";

      // 先載入主體 HTML
      await loadProtectedContent();

      // 再載入主體 script
      await loadScript("main.js");

      // 如果 main.js 裡有初始化函數，可以在這裡呼叫
      if (typeof window.initMain === "function") {
        window.initMain();
      }
    }

    async function checkPassword() {
      const passwordInput = document.getElementById("password");
      const error = document.getElementById("error");
      const inputPassword = passwordInput.value;

      error.textContent = "";

      if (!inputPassword) {
        error.textContent = "請輸入密碼。";
        return;
      }

      try {
        const correctHash = await getCorrectHash();
        const inputHash = await sha256(inputPassword);

        if (inputHash === correctHash) {
          sessionStorage.setItem("authenticated", "true");
          await unlockPage();
        } else {
          error.textContent = "密碼錯誤，請再試一次。";
        }
      } catch (err) {
        console.error(err);
        error.textContent = "驗證或載入內容失敗。";
      }
    }

    document.getElementById("login-button").addEventListener("click", checkPassword);

    document.getElementById("password").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        checkPassword();
      }
    });

    window.addEventListener("load", async function () {
      if (sessionStorage.getItem("authenticated") === "true") {
        await unlockPage();
      }
    });
  </script>
</body>
</html>
